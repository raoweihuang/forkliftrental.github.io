<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售管理系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 销售管理系统</h1>
            <p>商务 · 产品 · 财务 · 维保 · 全流程管理</p>
        </div>

        <div class="toolbar">
            <button class="btn btn-primary" onclick="openModal()">➕ 新增销售记录</button>
            <button class="btn btn-success" onclick="saveData()">💾 保存数据</button>
            <button class="btn btn-info" onclick="loadData()">📂 加载数据</button>
            <button class="btn btn-info" onclick="exportData()">📥 导出数据</button>
            <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清空数据</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索客户名称、产品名称、合同编号..." onkeyup="filterData()">
            </div>
        </div>

        <div class="summary">
            <div class="summary-grid">
                <div class="summary-card">
                    <h4>总记录数</h4>
                    <div class="value" id="totalCount">0</div>
                </div>
                <div class="summary-card">
                    <h4>总销售额</h4>
                    <div class="value" id="totalSales">¥0</div>
                </div>
                <div class="summary-card">
                    <h4>应收金额</h4>
                    <div class="value" id="totalReceivable">¥0</div>
                </div>
                <div class="summary-card">
                    <h4>已收款</h4>
                    <div class="value" id="totalReceived">¥0</div>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table id="salesTable">
                <thead>
                    <tr>
                        <th class="section-business">合同编号</th>
                        <th class="section-business">客户名称</th>
                        <th class="section-business">销售日期</th>
                        <th class="section-business">销售负责人</th>
                        <th class="section-business">销售阶段</th>
                        <th class="section-product">产品名称</th>
                        <th class="section-product">产品型号</th>
                        <th class="section-product">数量</th>
                        <th class="section-finance">单价(¥)</th>
                        <th class="section-finance">总金额(¥)</th>
                        <th class="section-finance">已收款(¥)</th>
                        <th class="section-finance">收款状态</th>
                        <th class="section-maintenance">维保开始</th>
                        <th class="section-maintenance">维保结束</th>
                        <th class="section-other">备注</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
            <div id="emptyState" class="empty-state">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                </svg>
                <h3>暂无数据</h3>
                <p>点击"新增销售记录"开始添加数据</p>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增销售记录</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="salesForm">
                    <input type="hidden" id="editIndex">
                    
                    <div class="section section-business">
                        <h3>📋 商务信息</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>合同编号 *</label>
                                <input type="text" id="contractNo" required>
                            </div>
                            <div class="form-group">
                                <label>客户名称 *</label>
                                <input type="text" id="customerName" required>
                            </div>
                            <div class="form-group">
                                <label>联系人</label>
                                <input type="text" id="contactPerson">
                            </div>
                            <div class="form-group">
                                <label>联系电话</label>
                                <input type="tel" id="contactPhone">
                            </div>
                            <div class="form-group">
                                <label>销售日期 *</label>
                                <input type="date" id="saleDate" required>
                            </div>
                            <div class="form-group">
                                <label>销售负责人 *</label>
                                <input type="text" id="salesPerson" required>
                            </div>
                            <div class="form-group">
                                <label>销售阶段</label>
                                <select id="salesStage">
                                    <option value="询价">询价</option>
                                    <option value="报价">报价</option>
                                    <option value="谈判">谈判</option>
                                    <option value="已签约">已签约</option>
                                    <option value="已交付">已交付</option>
                                    <option value="已完成">已完成</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>合同金额(¥)</label>
                                <input type="number" id="contractAmount" step="0.01">
                            </div>
                        </div>
                    </div>

                    <div class="section section-product">
                        <h3>📦 产品信息</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>产品名称 *</label>
                                <input type="text" id="productName" required>
                            </div>
                            <div class="form-group">
                                <label>产品型号</label>
                                <input type="text" id="productModel">
                            </div>
                            <div class="form-group">
                                <label>产品类别</label>
                                <select id="productCategory">
                                    <option value="软件">软件</option>
                                    <option value="硬件">硬件</option>
                                    <option value="服务">服务</option>
                                    <option value="解决方案">解决方案</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>数量 *</label>
                                <input type="number" id="quantity" min="1" value="1" required>
                            </div>
                            <div class="form-group">
                                <label>单价(¥) *</label>
                                <input type="number" id="unitPrice" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label>交付日期</label>
                                <input type="date" id="deliveryDate">
                            </div>
                        </div>
                    </div>

                    <div class="section section-finance">
                        <h3>💰 财务信息</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>总金额(¥)</label>
                                <input type="number" id="totalAmount" step="0.01" readonly>
                            </div>
                            <div class="form-group">
                                <label>已收款(¥)</label>
                                <input type="number" id="receivedAmount" step="0.01" value="0">
                            </div>
                            <div class="form-group">
                                <label>应收金额(¥)</label>
                                <input type="number" id="receivableAmount" step="0.01" readonly>
                            </div>
                            <div class="form-group">
                                <label>收款方式</label>
                                <select id="paymentMethod">
                                    <option value="银行转账">银行转账</option>
                                    <option value="现金">现金</option>
                                    <option value="支票">支票</option>
                                    <option value="分期付款">分期付款</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>收款状态</label>
                                <select id="paymentStatus">
                                    <option value="未收款">未收款</option>
                                    <option value="部分收款">部分收款</option>
                                    <option value="已收款">已收款</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>发票类型</label>
                                <select id="invoiceType">
                                    <option value="普通发票">普通发票</option>
                                    <option value="专用发票">专用发票</option>
                                    <option value="不开票">不开票</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="section section-maintenance">
                        <h3>🔧 维保信息</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>维保开始日期</label>
                                <input type="date" id="warrantyStart">
                            </div>
                            <div class="form-group">
                                <label>维保结束日期</label>
                                <input type="date" id="warrantyEnd">
                            </div>
                            <div class="form-group">
                                <label>维保类型</label>
                                <select id="warrantyType">
                                    <option value="免费维保">免费维保</option>
                                    <option value="付费维保">付费维保</option>
                                    <option value="无维保">无维保</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>维保内容</label>
                                <input type="text" id="warrantyContent">
                            </div>
                            <div class="form-group">
                                <label>服务级别</label>
                                <select id="serviceLevel">
                                    <option value="标准服务">标准服务</option>
                                    <option value="高级服务">高级服务</option>
                                    <option value="VIP服务">VIP服务</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="section section-other">
                        <h3>📝 其他信息</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>项目来源</label>
                                <input type="text" id="projectSource">
                            </div>
                            <div class="form-group">
                                <label>合作方</label>
                                <input type="text" id="partner">
                            </div>
                            <div class="form-group" style="grid-column: 1 / -1;">
                                <label>备注</label>
                                <textarea id="remarks" placeholder="请输入备注信息..."></textarea>
                            </div>
                            <div class="form-group" style="grid-column: 1 / -1;">
                                <label>附件说明</label>
                                <textarea id="attachments" placeholder="请输入附件信息..."></textarea>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveForm()">保存</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
